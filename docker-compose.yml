name: nexus-ai

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    profiles:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    env_file:
      - .env
    ports:
      - "5173:5173"
    profiles:
      - frontend
