[project]
name = "nexus-ai-backend"
version = "0.1.0"
description = "FastAPI backend foundation for Nexus AI"
requires-python = ">=3.11"
dependencies = [
  "alembic",
  "asyncpg",
  "fastapi",
  "pydantic-settings",
  "sqlalchemy",
  "uvicorn[standard]"
]

[tool.pytest.ini_options]
testpaths = ["tests"]
